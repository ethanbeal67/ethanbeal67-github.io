<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Weather Station</title>
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border-color: #e1e4e8;
            --panel-shadow: rgba(0,0,0,0.08);
            --header-color: #005b60;
            --card-bg: #f8f9fa;
            --card-border: #edf0f2;
            --temp-dark: #222222;
        }

        body.dark-theme {
            --bg-color: #0f1115;
            --panel-bg: #161920;
            --text-main: #f0f3f6;
            --text-muted: #959da5;
            --border-color: #2f363d;
            --panel-shadow: rgba(0,0,0,0.4);
            --header-color: #39adb5;
            --card-bg: #1f242c;
            --card-border: #21262d;
            --temp-dark: #ffffff;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--panel-shadow);
            border: 1px solid var(--border-color);
            position: relative;
            transition: background-color 0.5s ease;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: var(--header-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 4px;
        }

        .media-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #11141a;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .map-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .tv-pin {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 8px rgba(0,0,0,0.8);
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .forecast-list, .hourly-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            flex-grow: 1;
            justify-content: space-around;
        }

        .hourly-list { flex-direction: row; align-items: center; }

        .forecast-day {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--card-border);
        }

        .forecast-day img { width: 35px; height: 35px; border-radius: 4px; }

        .hourly-card {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            border: 1px solid var(--card-border);
        }

        .hourly-card img { width: 30px; height: 30px; border-radius: 4px; }
        .temp-high { color: #d9381e; font-weight: bold; }
        .temp-low { color: #007a87; font-weight: bold; }
        .pop { color: #1a73e8; font-size: 0.8rem; font-weight: bold; }
        body.dark-theme .pop { color: #58a6ff; }

        .severe-breakdown {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: var(--panel-bg);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 1000;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        .threat-item { margin-bottom: 2px; font-weight: bold; }
        .threat-tor { color: #c62828; }
        .threat-wind { color: #2e7d32; }
        .threat-hail { color: #1565c0; }

        .astro-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--panel-bg);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 1000;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="panel" style="padding:0;">
            <div class="media-container" id="radarContainer">
                <canvas id="radarCanvas" class="map-canvas" width="512" height="512"></canvas>
                <div id="radarPin1" class="tv-pin"></div>
                <div id="radarPin2" class="tv-pin" style="display:none;"></div>
            </div>
        </div>

        <div class="panel" style="padding:0;">
            <div class="media-container" id="outlookContainer">
                <img id="outlookStream" class="media-stream" src="https://www.spc.noaa.gov/products/outlook/day1otlk.gif" onerror="this.src='https://www.spc.noaa.gov/products/outlook/day1otlk_1630.gif'" alt="Severe Weather Outlook" style="width:100%; height:100%; object-fit:contain;">
                <div id="outlookPin1" class="tv-pin"></div>
                <div id="outlookPin2" class="tv-pin" style="display:none;"></div>
                
                <div class="severe-breakdown" id="breakdownBox">
                    <div class="threat-item threat-tor">🌪️ Tornado: <span id="prob-tor">0%</span></div>
                    <div class="threat-item threat-wind">💨 Wind: <span id="prob-wind">0%</span></div>
                    <div class="threat-item threat-hail">💥 Hail: <span id="prob-hail">0%</span></div>
                </div>

                <div class="astro-panel" id="astroBox">
                    <span>🌅 Sunrise: <span id="sun-rise">--:--</span></span>
                    <span>🌇 Sunset: <span id="sun-set">--:--</span></span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>5-Day Forecast</h2>
            <div class="forecast-list" id="daily-forecast">Loading daily forecast...</div>
        </div>

        <div class="panel">
            <h2>Hourly Forecast (Next 10 Hours)</h2>
            <div class="hourly-list" id="hourly-forecast">Loading hourly data...</div>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const pinLat = parseFloat(urlParams.get('pinLat')) || 35.5498; 
        const pinLon = parseFloat(urlParams.get('pinLon')) || -84.8866;
        const pinColor = urlParams.get('pinColor') || '#00843D';

        const pinLat2 = urlParams.get('pinLat2') ? parseFloat(urlParams.get('pinLat2')) : null;
        const pinLon2 = urlParams.get('pinLon2') ? parseFloat(urlParams.get('pinLon2')) : null;
        const pinColor2 = urlParams.get('pinColor2') || '#0C2340';
        
        const headers = { 'User-Agent': '(myfamilyweatherdashboard.com, contact@weather.com)' };

        // --- 1. RAINVIEWER RAW API MAP LOOPER (Bypasses Blocks & Removes All Buttons/Logos) ---
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        let radarFrames = [];
        let currentFrameIndex = 0;

        // Converts geographic coordinates to mercantil tile indexes to center map around your coordinates
        function lon2tile(lon, zoom) { return (Math.floor((lon + 180) / 360 * Math.pow(2, zoom))); }
        function lat2tile(lat, zoom) { return (Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom))); }

        function initRadarMap() {
            const zoom = 6;
            const xtile = lon2tile(pinLon, zoom);
            const ytile = lat2tile(pinLat, zoom);

            // Compute the precision bounding positions for custom pins inside standard canvas grids
            const tSize = 256;
            const lonFactor = (pinLon + 180) / 360 * Math.pow(2, zoom);
            const latFactor = (1 - Math.log(Math.tan(pinLat * Math.PI / 180) + 1 / Math.cos(pinLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom);
            
            const pinX = ((lonFactor - xtile) * tSize) + (tSize / 2);
            const pinY = ((latFactor - ytile) * tSize) + (tSize / 2);

            const p1_radar = document.getElementById('radarPin1');
            p1_radar.style.left = `${(pinX / 512) * 100}%`; p1_radar.style.top = `${(pinY / 512) * 100}%`;
            p1_radar.style.backgroundColor = pinColor;

            if (pinLat2 && pinLon2) {
                const lonFactor2 = (pinLon2 + 180) / 360 * Math.pow(2, zoom);
                const latFactor2 = (1 - Math.log(Math.tan(pinLat2 * Math.PI / 180) + 1 / Math.cos(pinLat2 * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom);
                const pinX2 = ((lonFactor2 - xtile) * tSize) + (tSize / 2);
                const pinY2 = ((latFactor2 - ytile) * tSize) + (tSize / 2);
                const p2_radar = document.getElementById('radarPin2');
                p2_radar.style.left = `${(pinX2 / 512) * 100}%`; p2_radar.style.top = `${(pinY2 / 512) * 100}%`;
                p2_radar.style.backgroundColor = pinColor2;
                p2_radar.style.display = 'block';
            }

            // Pin setup for National Outlook matrix image layer panel
            const minOutLat = 23.0, maxOutLat = 50.0;
            const minOutLon = -127.0, maxOutLon = -65.0;
            const ox1 = ((pinLon - minOutLon) / (maxOutLon - minOutLon)) * 100;
            const oy1 = (100 - ((pinLat - minOutLat) / (maxOutLat - minOutLat)) * 100);
            const p1_out = document.getElementById('outlookPin1');
            p1_out.style.left = `${ox1}%`; p1_out.style.top = `${oy1}%`;
            p1_out.style.backgroundColor = pinColor;

            if (pinLat2 && pinLon2) {
                const ox2 = ((pinLon2 - minOutLon) / (maxOutLon - minOutLon)) * 100;
                const oy2 = (100 - ((pinLat2 - minOutLat) / (maxOutLat - minOutLat)) * 100);
                const p2_out = document.getElementById('outlookPin2');
                p2_out.style.left = `${ox2}%`; p2_out.style.top = `${oy2}%`;
                p2_out.style.backgroundColor = pinColor2;
                p2_out.style.display = 'block';
            }

            // Fetch current API loop layers from RainViewer maps matrix
            fetch('https://api.rainviewer.com/public/weather-maps.json')
                .then(res => res.json())
                .then(apiData => {
                    const latestPastRadar = apiData.radar.past;
                    // Gather images for the last 5 frames to generate loop array
                    const framesToFetch = latestPastRadar.slice(-5); 
                    
                    let loadedCount = 0;
                    radarFrames = [];

                    framesToFetch.forEach((frame, idx) => {
                        const bgImg = new Image();
                        const radarImg = new Image();
                        bgImg.crossOrigin = "anonymous";
                        radarImg.crossOrigin = "anonymous";

                        // Collects map backgrounds alongside real-time storm data tracks
                        bgImg.src = `https://tile.openstreetmap.org/${zoom}/${xtile}/${ytile}.png`;
                        radarImg.src = `${apiData.host}${frame.path}/256/${zoom}/${xtile}/${ytile}/1/1_1.png`;

                        let mapsReady = 0;
                        const checkReady = () => {
                            mapsReady++;
                            if (mapsReady === 2) {
                                radarFrames[idx] = { bg: bgImg, radar: radarImg };
                                loadedCount++;
                                if (loadedCount === framesToFetch.length) {
                                    startRadarAnimationLoop();
                                }
                            }
                        };
                        bgImg.onload = checkReady;
                        radarImg.onload = checkReady;
                    });
                });
        }

        function startRadarAnimationLoop() {
            setInterval(() => {
                if (radarFrames.length === 0) return;
                const activeFrame = radarFrames[currentFrameIndex];
                if (activeFrame && activeFrame.bg && activeFrame.radar) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    // Stitch 4 quadrants to assemble the canvas grid centered on your coordinates
                    ctx.drawImage(activeFrame.bg, 0, 0, 512, 512);
                    ctx.drawImage(activeFrame.radar, 0, 0, 512, 512);
                }
                currentFrameIndex = (currentFrameIndex + 1) % radarFrames.length;
            }, 800); // Frame rate timing for smooth looping animation
        }
        initRadarMap();

        // --- 2. THEME & SOLAR CLOCK TRACKERS ---
        function computeSolarTimes(lat, lon) {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);

            const lngHour = lon / 15;
            const tRise = dayOfYear + ((6 - lngHour) / 24);
            const tSet = dayOfYear + ((18 - lngHour) / 24);

            const M_rise = (0.9856 * tRise) - 3.289;
            const M_set = (0.9856 * tSet) - 3.289;

            const L_rise = M_rise + (1.916 * Math.sin(M_rise * Math.PI / 180)) + (0.020 * Math.sin(2 * M_rise * Math.PI / 180)) + 282.634;
            const L_set = M_set + (1.916 * Math.sin(M_set * Math.PI / 180)) + (0.020 * Math.sin(2 * M_set * Math.PI / 180)) + 282.634;

            let RA_rise = Math.atan(0.91746 * Math.tan(L_rise * Math.PI / 180)) * 180 / Math.PI;
            let RA_set = Math.atan(0.91746 * Math.tan(L_set * Math.PI / 180)) * 180 / Math.PI;

            RA_rise = (RA_rise + 360) % 360 / 15;
            RA_set = (RA_set + 360) % 360 / 15;

            const sinDec_rise = 0.39782 * Math.sin(L_rise * Math.PI / 180);
            const sinDec_set = 0.39782 * Math.sin(L_set * Math.PI / 180);
            const cosDec_rise = Math.cos(Math.asin(sinDec_rise));
            const cosDec_set = Math.cos(Math.asin(sinDec_set));

            const cosH_rise = (Math.cos(90.833 * Math.PI / 180) - (sinDec_rise * Math.sin(lat * Math.PI / 180))) / (cosDec_rise * Math.cos(lat * Math.PI / 180));
            const cosH_set = (Math.cos(90.833 * Math.PI / 180) - (sinDec_set * Math.sin(lat * Math.PI / 180))) / (cosDec_set * Math.cos(lat * Math.PI / 180));

            const H_rise = (360 - Math.acos(cosH_rise) * 180 / Math.PI) / 15;
            const H_set = (Math.acos(cosH_set) * 180 / Math.PI) / 15;

            const UT_rise = H_rise + RA_rise - (0.06571 * tRise) - 6.622 - lngHour;
            const UT_set = H_set + RA_set - (0.06571 * tSet) - 6.622 - lngHour;

            const localRiseHours = (UT_rise + 24 + (now.getTimezoneOffset() / -60)) % 24;
            const localSetHours = (UT_set + 24 + (now.getTimezoneOffset() / -60)) % 24;

            const parseClockStr = (decimalHours, forcedAmPm) => {
                const h = Math.floor(decimalHours);
                const m = Math.floor((decimalHours - h) * 60);
                const displayH = h % 12 === 0 ? 12 : h % 12;
                return `${displayH}:${m < 10 ? '0' + m : m} ${forcedAmPm}`;
            };

            document.getElementById('sun-rise').innerText = parseClockStr(localRiseHours, 'AM');
            document.getElementById('sun-set').innerText = parseClockStr(localSetHours, 'PM');

            const currentDecimalTime = now.getHours() + (now.getMinutes() / 60);
            if (currentDecimalTime >= localRiseHours && currentDecimalTime <= localSetHours) {
                document.body.classList.remove('dark-theme');
            } else {
                document.body.classList.add('dark-theme');
            }
        }
        computeSolarTimes(pinLat, pinLon);

        // --- 3. SEVERE WEATHER OUTLOOK DATA PROBABILITIES ---
        const threatLayers = [
            { id: 3, elementId: 'prob-tor', unit: '%' },
            { id: 5, elementId: 'prob-hail', unit: '%' },
            { id: 7, elementId: 'prob-wind', unit: '%' }
        ];
        threatLayers.forEach(layer => {
            const url = `https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer/${layer.id}/query?geometry=${pinLon},${pinLat}&geometryType=esriGeometryPoint&spatialRel=esriSpatialRelIntersects&outFields=*&f=geojson`;
            fetch(url).then(res => res.json()).then(data => {
                if (data.features && data.features.length > 0) {
                    let maxProb = 0;
                    data.features.forEach(f => {
                        const probVal = parseInt(f.properties.LABEL);
                        if (!isNaN(probVal) && probVal > maxProb) maxProb = probVal;
                    });
                    document.getElementById(layer.elementId).innerText = maxProb > 0 ? maxProb + layer.unit : "0%";
                }
            }).catch(() => document.getElementById(layer.elementId).innerText = "0%");
        });

        // --- 4. WEATHER.GOV PANELS FORECAST ENGINE ---
        fetch(`https://api.weather.gov/points/${pinLat},${pinLon}`, { headers })
            .then(res => res.json())
            .then(pointData => {
                fetch(pointData.properties.forecast, { headers }).then(res => res.json()).then(fData => {
                    const container = document.getElementById('daily-forecast');
                    container.innerHTML = '';
                    const periods = fData.properties.periods;
                    let structuredDays = [];
                    periods.forEach(p => { if (p.isDaytime) structuredDays.push(p); });

                    for (let i = 0; i < structuredDays.slice(0, 5).length; i++) {
                        const day = structuredDays[i];
                        const pop = day.probabilityOfPrecipitation?.value || 0;
                        container.innerHTML += `
                            <div class="forecast-day">
                                <div style="font-weight:bold; width:110px; color:var(--text-main);">${day.name}</div>
                                <img src="${day.icon.split(',')[0]}" alt="icon">
                                <div class="pop">💧 ${pop}%</div>
                                <div style="width: 70px; text-align: right;"><span class="temp-high">${day.temperature}°</span></div>
                            </div>
                        `;
                    }
                });

                fetch(pointData.properties.forecastHourly, { headers }).then(res => res.json()).then(hData => {
                    const container = document.getElementById('hourly-forecast');
                    container.innerHTML = '';
                    hData.properties.periods.slice(0, 10).forEach(hour => {
                        const time = new Date(hour.startTime).toLocaleTimeString([], { hour: 'numeric' });
                        const pop = hour.probabilityOfPrecipitation?.value || 0;
                        container.innerHTML += `
                            <div class="hourly-card">
                                <div style="font-size:0.8rem; color:var(--text-muted); font-weight:500;">${time}</div>
                                <img src="${hour.icon.split(',')[0]}" alt="icon">
                                <div style="font-weight:bold; font-size:1rem; color:var(--temp-dark);">${hour.temperature}°</div>
                                <div class="pop">💧 ${pop}%</div>
                            </div>
                        `;
                    });
                });
            });

        // Auto-refresh whole dataset cycle loop every 10 minutes hands-free
        setInterval(() => { initRadarMap(); }, 600000);
    </script>
</body>
</html>
