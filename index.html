<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Weather Station</title>
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border-color: #e1e4e8;
            --panel-shadow: rgba(0,0,0,0.08);
            --header-color: #005b60;
            --card-bg: #f8f9fa;
            --card-border: #edf0f2;
            --temp-dark: #222222;
        }

        body.dark-theme {
            --bg-color: #0f1115;
            --panel-bg: #161920;
            --text-main: #f0f3f6;
            --text-muted: #959da5;
            --border-color: #2f363d;
            --panel-shadow: rgba(0,0,0,0.4);
            --header-color: #39adb5;
            --card-bg: #1f242c;
            --card-border: #21262d;
            --temp-dark: #ffffff;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--panel-shadow);
            border: 1px solid var(--border-color);
            position: relative;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: var(--header-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 4px;
        }

        .map-wrapper { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            border-radius: 8px;
        }
        
        .map-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            background-color: #e5e9f0;
        }

        .forecast-list, .hourly-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            flex-grow: 1;
            justify-content: space-around;
        }

        .hourly-list { flex-direction: row; align-items: center; }

        .forecast-day {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--card-border);
        }

        .forecast-day img { width: 35px; height: 35px; border-radius: 4px; }

        .hourly-card {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            border: 1px solid var(--card-border);
        }

        .hourly-card img { width: 30px; height: 30px; border-radius: 4px; }
        .temp-high { color: #d9381e; font-weight: bold; }
        .temp-low { color: #007a87; font-weight: bold; }
        .pop { color: #1a73e8; font-size: 0.8rem; font-weight: bold; }
        body.dark-theme .pop { color: #58a6ff; }

        .severe-breakdown {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: var(--panel-bg);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 1000;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            pointer-events: none;
        }
        .threat-item { margin-bottom: 2px; font-weight: bold; }
        .threat-tor { color: #c62828; }
        .threat-wind { color: #2e7d32; }
        .threat-hail { color: #1565c0; }

        .astro-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--panel-bg);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 1000;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel" style="padding:0;">
            <div class="map-wrapper">
                <iframe id="radarFrame" class="map-frame" allow="geolocation"></iframe>
            </div>
        </div>

        <div class="panel" style="padding:0;">
            <div class="map-wrapper">
                <iframe id="outlookFrame" class="map-frame" allow="geolocation"></iframe>
                
                <div class="severe-breakdown" id="breakdownBox">
                    <div class="threat-item threat-tor">🌪️ Tornado: <span id="prob-tor">0%</span></div>
                    <div class="threat-item threat-wind">💨 Wind: <span id="prob-wind">0%</span></div>
                    <div class="threat-item threat-hail">💥 Hail: <span id="prob-hail">0%</span></div>
                </div>

                <div class="astro-panel" id="astroBox">
                    <span>🌅 Sunrise: <span id="sun-rise">--:--</span></span>
                    <span>🌇 Sunset: <span id="sun-set">--:--</span></span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>5-Day Forecast</h2>
            <div class="forecast-list" id="daily-forecast">Loading daily forecast...</div>
        </div>

        <div class="panel">
            <h2>Hourly Forecast (Next 10 Hours)</h2>
            <div class="hourly-list" id="hourly-forecast">Loading hourly data...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const pinLat = parseFloat(urlParams.get('pinLat')) || 35.5498; 
        const pinLon = parseFloat(urlParams.get('pinLon')) || -84.8866;

        const radarZoom = Math.round(parseInt(urlParams.get('radarZoom')) || 8);
        const outlookZoom = Math.round(parseInt(urlParams.get('outlookZoom')) || 5);
        const headers = { 'User-Agent': '(myfamilyweatherdashboard.com, contact@weather.com)' };

        // --- INJECT EMBEDDED MAP STREAMS INTO THE IFRAMES ---
        // Dynamically generating interactive secure maps centered directly on your parameters
        document.getElementById('radarFrame').src = `https://www.rainviewer.com/map.html?loc=${pinLat},${pinLon},${radarZoom}&o=1&t=1&e=1&v=1&w=1&sm=1&sn=1`;
        document.getElementById('outlookFrame').src = `https://www.rainviewer.com/map.html?loc=${pinLat},${pinLon},${outlookZoom}&o=1&t=1&e=0&v=1&w=1&sm=0&sn=1`;

        // --- FIXED SUN ENGINE: True Local Calculations and Theme Filters ---
        function computeSolarTimes(lat, lon) {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);

            const lngHour = lon / 15;
            const tRise = dayOfYear + ((6 - lngHour) / 24);
            const tSet = dayOfYear + ((18 - lngHour) / 24);

            const M_rise = (0.9856 * tRise) - 3.289;
            const M_set = (0.9856 * tSet) - 3.289;

            const L_rise = M_rise + (1.916 * Math.sin(M_rise * Math.PI / 180)) + (0.020 * Math.sin(2 * M_rise * Math.PI / 180)) + 282.634;
            const L_set = M_set + (1.916 * Math.sin(M_set * Math.PI / 180)) + (0.020 * Math.sin(2 * M_set * Math.PI / 180)) + 282.634;

            let RA_rise = Math.atan(0.91746 * Math.tan(L_rise * Math.PI / 180)) * 180 / Math.PI;
            let RA_set = Math.atan(0.91746 * Math.tan(L_set * Math.PI / 180)) * 180 / Math.PI;

            RA_rise = (RA_rise + 360) % 360 / 15;
            RA_set = (RA_set + 360) % 360 / 15;

            const sinDec_rise = 0.39782 * Math.sin(L_rise * Math.PI / 180);
            const sinDec_set = 0.39782 * Math.sin(L_set * Math.PI / 180);
            const cosDec_rise = Math.cos(Math.asin(sinDec_rise));
            const cosDec_set = Math.cos(Math.asin(sinDec_set));

            const cosH_rise = (Math.cos(90.833 * Math.PI / 180) - (sinDec_rise * Math.sin(lat * Math.PI / 180))) / (cosDec_rise * Math.cos(lat * Math.PI / 180));
            const cosH_set = (Math.cos(90.833 * Math.PI / 180) - (sinDec_set * Math.sin(lat * Math.PI / 180))) / (cosDec_set * Math.cos(lat * Math.PI / 180));

            const H_rise = (360 - Math.acos(cosH_rise) * 180 / Math.PI) / 15;
            const H_set = (Math.acos(cosH_set) * 180 / Math.PI) / 15;

            const UT_rise = H_rise + RA_rise - (0.06571 * tRise) - 6.622 - lngHour;
            const UT_set = H_set + RA_set - (0.06571 * tSet) - 6.622 - lngHour;

            const localRiseHours = (UT_rise + 24 + (now.getTimezoneOffset() / -60)) % 24;
            const localSetHours = (UT_set + 24 + (now.getTimezoneOffset() / -60)) % 24;

            const parseClockStr = (decimalHours, forcedAmPm) => {
                const h = Math.floor(decimalHours);
                const m = Math.floor((decimalHours - h) * 60);
                const displayH = h % 12 === 0 ? 12 : h % 12;
                return `${displayH}:${m < 10 ? '0' + m : m} ${forcedAmPm}`;
            };

            document.getElementById('sun-rise').innerText = parseClockStr(localRiseHours, 'AM');
            document.getElementById('sun-set').innerText = parseClockStr(localSetHours, 'PM');

            const currentHours = now.getHours();
            const currentMinutes = now.getMinutes();
            const currentDecimalTime = currentHours + (currentMinutes / 60);

            // Validates day or night constraints to control the theme state
            if (currentDecimalTime >= localRiseHours && currentDecimalTime <= localSetHours) {
                document.body.classList.remove('dark-theme');
            } else {
                document.body.classList.add('dark-theme');
            }
        }
        computeSolarTimes(pinLat, pinLon);

        // --- LIVE PROBABILITIES FEED ---
        const threatLayers = [
            { id: 3, elementId: 'prob-tor', unit: '%' },
            { id: 5, elementId: 'prob-hail', unit: '%' },
            { id: 7, elementId: 'prob-wind', unit: '%' }
        ];
        threatLayers.forEach(layer => {
            const url = `https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer/${layer.id}/query?geometry=${pinLon},${pinLat}&geometryType=esriGeometryPoint&spatialRel=esriSpatialRelIntersects&outFields=*&f=geojson`;
            fetch(url).then(res => res.json()).then(data => {
                if (data.features && data.features.length > 0) {
                    let maxProb = 0;
                    data.features.forEach(f => {
                        const probVal = parseInt(f.properties.LABEL);
                        if (!isNaN(probVal) && probVal > maxProb) maxProb = probVal;
                    });
                    document.getElementById(layer.elementId).innerText = maxProb > 0 ? maxProb + layer.unit : "0%";
                }
            }).catch(() => document.getElementById(layer.elementId).innerText = "0%");
        });

        // --- FORECAST DATA ENGINE ---
        fetch(`https://api.weather.gov/points/${pinLat},${pinLon}`, { headers })
            .then(res => res.json())
            .then(pointData => {
                fetch(pointData.properties.forecast, { headers }).then(res => res.json()).then(fData => {
                    const container = document.getElementById('daily-forecast');
                    container.innerHTML = '';
                    const periods = fData.properties.periods;
                    let structuredDays = [];
                    periods.forEach(p => { if (p.isDaytime) structuredDays.push(p); });

                    for (let i = 0; i < structuredDays.slice(0, 5).length; i++) {
                        const day = structuredDays[i];
                        const pop = day.probabilityOfPrecipitation?.value || 0;
                        container.innerHTML += `
                            <div class="forecast-day">
                                <div style="font-weight:bold; width:110px; color:var(--text-main);">${day.name}</div>
                                <img src="${day.icon.split(',')[0]}" alt="icon">
                                <div class="pop">💧 ${pop}%</div>
                                <div style="width: 70px; text-align: right;"><span class="temp-high">${day.temperature}°</span></div>
                            </div>
                        `;
                    }
                });

                fetch(pointData.properties.forecastHourly, { headers }).then(res => res.json()).then(hData => {
                    const container = document.getElementById('hourly-forecast');
                    container.innerHTML = '';
                    hData.properties.periods.slice(0, 10).forEach(hour => {
                        const time = new Date(hour.startTime).toLocaleTimeString([], { hour: 'numeric' });
                        const pop = hour.probabilityOfPrecipitation?.value || 0;
                        container.innerHTML += `
                            <div class="hourly-card">
                                <div style="font-size:0.8rem; color:var(--text-muted); font-weight:500;">${time}</div>
                                <img src="${hour.icon.split(',')[0]}" alt="icon">
                                <div style="font-weight:bold; font-size:1rem; color:var(--temp-dark);">${hour.temperature}°</div>
                                <div class="pop">💧 ${pop}%</div>
                            </div>
                        `;
                    });
                });
            });
    </script>
</body>
</html>
