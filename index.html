<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Weather Station</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 4-Quadrant Screen Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .panel {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .map-wrapper { padding: 0; position: relative; width: 100%; height: 100%; }
        .map-instance { width: 100%; height: 100%; border-radius: 8px; }

        /* Forecast lists layout */
        .forecast-list, .hourly-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .hourly-list {
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            align-items: center;
        }

        .forecast-day {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #252525;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .forecast-day img { width: 40px; height: 40px; }

        .hourly-card {
            background: #252525;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            min-width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .hourly-card img { width: 35px; height: 35px; }

        .temp-high { color: #ff5722; font-weight: bold; }
        .temp-low { color: #00bcd4; font-weight: bold; }
        .pop { color: #2196f3; font-size: 0.85rem; }

        /* Severe Threats Overlay */
        .severe-breakdown {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(20, 20, 20, 0.85);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 1000;
            border: 1px solid #444;
            pointer-events: none;
        }
        .threat-item { margin-bottom: 4px; font-weight: bold; }
        .threat-tor { color: #ff5252; }
        .threat-wind { color: #4caf50; }
        .threat-hail { color: #2196f3; }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="panel" style="padding:0;">
            <div class="map-wrapper">
                <div id="radarMap" class="map-instance"></div>
            </div>
        </div>

        <div class="panel" style="padding:0;">
            <div class="map-wrapper">
                <div id="outlookMap" class="map-instance"></div>
                <div class="severe-breakdown" id="breakdownBox">
                    <div class="threat-item threat-tor">🌪️ Tornado: <span id="prob-tor">0%</span></div>
                    <div class="threat-item threat-wind">💨 Damaging Wind: <span id="prob-wind">0%</span></div>
                    <div class="threat-item threat-hail">💥 Large Hail: <span id="prob-hail">0%</span></div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>5-Day Forecast</h2>
            <div class="forecast-list" id="daily-forecast">Loading daily forecast...</div>
        </div>

        <div class="panel">
            <h2>Hourly Forecast (Next 12 Hours)</h2>
            <div class="hourly-list" id="hourly-forecast">Loading hourly data...</div>
        </div>

    </div>

    <script>
        // Extract parameters from URL
        const urlParams = new URLSearchParams(window.location.search);

        // Required Pin 1 (Primary target location used for data lookups)
        const pinLat = parseFloat(urlParams.get('pinLat')) || 36.2230; 
        const pinLon = parseFloat(urlParams.get('pinLon')) || -84.1120; // Default: West side of Norris Lake

        // Optional Pin 2 (For multi-house views like Ohio)
        const pinLat2 = urlParams.get('pinLat2') ? parseFloat(urlParams.get('pinLat2')) : null;
        const pinLon2 = urlParams.get('pinLon2') ? parseFloat(urlParams.get('pinLon2')) : null;

        // Map Center Overrides (Letting you push the camera view further West)
        const radarCenterLat = parseFloat(urlParams.get('radarLat')) || 36.3000;
        const radarCenterLon = parseFloat(urlParams.get('radarLon')) || -84.4000; 
        const radarZoom = parseInt(urlParams.get('radarZoom')) || 8;

        const outlookCenterLat = parseFloat(urlParams.get('outlookLat')) || 36.3200;
        const outlookCenterLon = parseFloat(urlParams.get('outlookLon')) || -83.9500; 
        const outlookZoom = parseInt(urlParams.get('outlookZoom')) || 9;

        const lockSettings = {
            dragging: false, zoomControl: false, scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false, touchZoom: false
        };

        // --- MAP 1: LIVE RADAR MAP ---
        const radarMap = L.map('radarMap', { ...lockSettings, center: [radarCenterLat, radarCenterLon], zoom: radarZoom });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

        // Standard NWS Live Radar Layer (WMS Service)
        L.tileLayer.wms("https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qpe/wms", {
            layers: 'conus_bref_qpe', format: 'image/png', transparent: true, opacity: 0.6
        }).addTo(radarMap);

        // Add pins to Radar Map
        L.circleMarker([pinLat, pinLon], { radius: 6, color: '#ffffff', fillColor: '#ff5722', fillOpacity: 1, weight: 2 }).addTo(radarMap);
        if (pinLat2 && pinLon2) {
            L.circleMarker([pinLat2, pinLon2], { radius: 6, color: '#ffffff', fillColor: '#e91e63', fillOpacity: 1, weight: 2 }).addTo(radarMap);
        }

        // Active Warning Polygons
        fetch(`https://api.weather.gov/alerts/active?point=${pinLat},${pinLon}`)
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function(feature) {
                        const event = feature.properties.event;
                        let color = "#ffeb3b";
                        if (event.includes("Tornado")) color = "#e91e63";
                        if (event.includes("Severe Thunderstorm")) color = "#ff5722";
                        if (event.includes("Flash Flood")) color = "#00bcd4";
                        return { color: color, weight: 3, fillOpacity: 0.15 };
                    }
                }).addTo(radarMap);
            });


        // --- MAP 2: REGIONAL SPC OUTLOOK MAP ---
        const outlookMap = L.map('outlookMap', { ...lockSettings, center: [outlookCenterLat, outlookCenterLon], zoom: outlookZoom });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(outlookMap);

        // Add pins to Outlook Map
        L.circleMarker([pinLat, pinLon], { radius: 6, color: '#ffffff', fillColor: '#00adb5', fillOpacity: 1, weight: 2 }).addTo(outlookMap);
        if (pinLat2 && pinLon2) {
            L.circleMarker([pinLat2, pinLon2], { radius: 6, color: '#ffffff', fillColor: '#00adb5', fillOpacity: 1, weight: 2 }).addTo(outlookMap);
        }

        // Fetch Day 1 Categorical Outlook layer
        const catUrl = "https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer/1/query?where=1%3D1&outFields=*&f=geojson";
        fetch(catUrl).then(res => res.json()).then(data => {
            L.geoJSON(data, {
                style: function(feature) {
                    let color = "transparent";
                    const label = feature.properties.LABEL;
                    if (label === "TSTM") color = "#c1e9c1";
                    if (label === "MRGL") color = "#008b00";
                    if (label === "SLGT") color = "#eeee00";
                    if (label === "ENH")  color = "#ff7f00";
                    if (label === "MDT")  color = "#ff0000";
                    if (label === "HIGH") color = "#ff00ff";
                    return { color: color, weight: 1.5, fillColor: color, fillOpacity: 0.25 };
                }
            }).addTo(outlookMap);
        });

        // Query Point Probabilities (Tornado = 3, Hail = 5, Wind = 7)
        const threatLayers = [
            { id: 3, elementId: 'prob-tor', unit: '% chance' },
            { id: 5, elementId: 'prob-hail', unit: '% chance' },
            { id: 7, elementId: 'prob-wind', unit: '% chance' }
        ];

        threatLayers.forEach(layer => {
            const url = `https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer/${layer.id}/query?geometry=${pinLon},${pinLat}&geometryType=esriGeometryPoint&spatialRel=esriSpatialRelIntersects&outFields=*&f=geojson`;
            fetch(url).then(res => res.json()).then(data => {
                if (data.features && data.features.length > 0) {
                    let maxProb = 0;
                    data.features.forEach(f => {
                        const probVal = parseInt(f.properties.LABEL);
                        if (!isNaN(probVal) && probVal > maxProb) maxProb = probVal;
                    });
                    document.getElementById(layer.elementId).innerText = maxProb > 0 ? maxProb + layer.unit : "Low / None";
                }
            }).catch(() => {
                document.getElementById(layer.elementId).innerText = "Low / None";
            });
        });


        // --- NWS COMPREHENSIVE TEXT FORECASTS ---
        const headers = { 'User-Agent': '(myfamilyweatherdashboard.com, contact@weather.com)' };

        fetch(`https://api.weather.gov/points/${pinLat},${pinLon}`, { headers })
            .then(res => res.json())
            .then(pointData => {
                const dailyUrl = pointData.properties.forecast;
                const hourlyUrl = pointData.properties.forecastHourly;

                // Daily Panel Builder
                fetch(dailyUrl, { headers })
                    .then(res => res.json())
                    .then(fData => {
                        const container = document.getElementById('daily-forecast');
                        container.innerHTML = '';
                        const periods = fData.properties.periods;
                        
                        for (let i = 0; i < periods.length && i < 10; i += 2) {
                            const day = periods[i];
                            const night = periods[i+1] || { temperature: 'N/A' };
                            const pop = day.probabilityOfPrecipitation?.value || 0;

                            container.innerHTML += `
                                <div class="forecast-day">
                                    <div style="font-weight:bold; width:100px;">${day.name}</div>
                                    <img src="${day.icon.split(',')[0]}" alt="icon">
                                    <div class="pop">${pop > 0 ? '💧 ' + pop + '%' : ''}</div>
                                    <div>
                                        <span class="temp-high">${day.temperature}°</span> / 
                                        <span class="temp-low">${night.temperature}°</span>
                                    </div>
                                </div>
                            `;
                        }
                    });

                // Hourly Panel Builder
                fetch(hourlyUrl, { headers })
                    .then(res => res.json())
                    .then(hData => {
                        const container = document.getElementById('hourly-forecast');
                        container.innerHTML = '';
                        const hours = hData.properties.periods.slice(0, 12);

                        hours.forEach(hour => {
                            const time = new Date(hour.startTime).toLocaleTimeString([], { hour: 'numeric' });
                            const pop = hour.probabilityOfPrecipitation?.value || 0;
                            container.innerHTML += `
                                <div class="hourly-card">
                                    <div style="font-size:0.85rem; color:#aaa;">${time}</div>
                                    <img src="${hour.icon.split(',')[0]}" alt="icon">
                                    <div style="font-weight:bold; font-size:1.1rem;">${hour.temperature}°</div>
                                    <div class="pop" style="font-size:0.75rem;">${pop > 0 ? pop + '%' : ''}</div>
                                </div>
                            `;
                        });
                    });
            });

        // Auto-refresh: 15 minutes
        setTimeout(() => { window.location.reload(); }, 15 * 60 * 1000);
    </script>
</body>
</html>
